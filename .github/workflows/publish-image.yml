name: Publish container image

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name (lowercase)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:sha-${{ github.sha }}
          # Bake the SPA's shared secret at image-build time. Rotating it
          # requires editing the GitHub secret and pushing a new commit.
          build-args: |
            VITE_RENDER_SHARED_SECRET=${{ secrets.VITE_RENDER_SHARED_SECRET }}
            VITE_DEPLOY_MODE=selfhost
          cache-from: type=gha
          cache-to: type=gha,mode=max
